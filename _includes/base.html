<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <link href="/style.css" rel="stylesheet" />
  <script defer src="/script.js"></script>
  <link rel="icon" href="/main_assets/logo.png">
</head>

<div id="lightbox-overlay" style="opacity:0; pointer-events:none; position:fixed; top:0; left:0; width:100%; height:100%; backdrop-filter:blur(12px); background:rgba(0,0,0,0.3); z-index:9999; display:flex; align-items:center; justify-content:center; transition:opacity 0.3s ease;">
  <button onclick="closeLightbox()" style="position:absolute; top:20px; right:30px; background:none; border:none; color:white; font-size:40px; cursor:pointer; font-family:'clubbed to life';">✕</button>
  <button class="lb-arrow lb-left" onclick="lightboxPrev(); event.stopPropagation();">❮</button>
  <img id="lightbox-img" style="max-width:75vw; max-height:90vh; border-radius:10px; transform:scale(0.9); transition:transform 0.3s ease;">
  <button class="lb-arrow lb-right" onclick="lightboxNext(); event.stopPropagation();">❯</button>
</div>

<body>

<header>
    <div class="header-inner">
      <div class="logo">
        <a href="/"><img src="/main_assets/logo.png"></a>
      </div>
    </div>
    {% if projectName %}
    <div class="project-name-box">
      <div class="project-name">
        <p>{{ projectName }}</p>
      </div>
    </div>
    {% endif %}
  </header>

  <nav>
    <ul class="nav-list">
      <li><a href="/about/">About</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <button><img src="/main_assets/hamburger.png" alt="menu"></button>
    </div>
  </nav>

  <div id="container">
    <div id="flex">

      <main>
        {{ content }}
      </main>

      <aside class="sidebar">
        {% include "sidebar.html" %}
      </aside>

    </div>

    <footer id="footer">
      <div class="contact">
        <ul class="contact-list">
          <li><a href="mailto:spencermhr@gmail.com">spencermhr@gmail.com</a></li>
          <li><a href="/about/">@spencinato</a></li>
        </ul>
      </div>
    </footer>
    <div class="copyright"><a href="/home/">© 2026 by Spencer Maher</a></div>
  </div>

</body>
</html>
